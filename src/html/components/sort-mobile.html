<div 
  class="sort-mobile" 
  data-sort-mobile 
  data-sort-id="catalog"
>
  <button data-mobile-toggle>
    <span>Сортировка</span>
    <span class="sort-mobile__caret">▼</span>
  </button>

  <div class="sort-mobile__content">
    <ul>
      <li data-sort-option data-value="default-desc">По умолчанию (убывание)</li>
      <li data-sort-option data-value="default-asc">По умолчанию (возрастание)</li>
      <li data-sort-option data-value="price-asc">Цена ↑</li>
      <li data-sort-option data-value="price-desc">Цена ↓</li>
    </ul>
  </div>
</div>
