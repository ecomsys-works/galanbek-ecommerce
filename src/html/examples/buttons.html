<!-- variants: 
--dark     # Кнока max-width 668 variant: dark (#6C537B)
--gray     # Кнока max-width 430 variant: gray (#B5B1B7)
--light    # Кнока max-width 340 variant: light (#C7ADD7)  
--full     # Простая на всю длину 
--tg         # Телеграм max-width 392 с закруглением 100
--tg-full    # Телеграм на всю длинну с закруглением 100
 -->

<!-- Просто кнопка padding 5rem -->
<a class="btn btn--dark">
	<span class="btn__text">Dark Button</span>
</a>
<!-- Кнока max-width 668 variant: dark (#6C537B)-->
<a class="btn btn--lg btn--dark">
	<span class="btn__text">Dark Button</span>
</a>

<!-- Кнока max-width 430 variant: gray (#B5B1B7)-->
<a class="btn btn--md btn--gray">
	<span class="btn__text">Gray Button</span>
</a>

<!-- Кнока max-width 340 variant: gray (#C7ADD7)-->
<a class="btn btn--sm btn--light">
	<span class="btn__text">Light Button</span>
</a>

<!-- Кнока для Telegram max-width 392 с закруглением 100 -->
<a class="btn btn--tg btn--dark">
	<span class="btn__text">Перейти в Telegram</span>
	<span class="btn__icon">
		<svg class="icon--telegram">
			<use href="./icons/symbol/sprite.svg#telegram"></use>
		</svg>
	</span>
</a>

<!-- Телеграм на всю длинну с закруглением 100 -->
<a class="btn btn--tg-full btn--dark">
	<span class="btn__text">Перейти в Telegram</span>
	<span class="btn__icon">
		<svg class="icon--telegram">
			<use href="./icons/symbol/sprite.svg#telegram"></use>
		</svg>
	</span>
</a>
