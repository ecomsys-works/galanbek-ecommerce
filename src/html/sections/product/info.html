<form class="product-info" id="productForm" data-product-id="123" data-product-title="Apple iPhone 17 Pro Max 256 Gb (Cosmic Orange)">
  <!-- PRICE -->
  <div class="product-info__price">
    <div class="product-info__price-old">110 000 ₽</div>
    <div class="product-info__price-current">
      <div class="product-info__price-new">93 990 ₽</div>
      <div class="product-info__price-badge">Акция</div>
    </div>
  </div>

  <div class="product-info__wrapper">
    <!-- COLOR -->
    <fieldset class="product-info__section product-info__section--color">
      <legend class="product-info__title">Цвет</legend>
      <div class="product-info__color-list">
        <label class="product-info__color-item">
          <input type="radio" name="color" value="1" required checked />
          <span class="product-info__color-swatch" style="--color: #f0eae0"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="2" />
          <span class="product-info__color-swatch" style="--color: #30d5c8"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="3" />
          <span class="product-info__color-swatch" style="--color: #ffffff"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="4" />
          <span class="product-info__color-swatch" style="--color: #6ab3d8"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="5" />
          <span class="product-info__color-swatch" style="--color: #85d542"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="6" />
          <span class="product-info__color-swatch" style="--color: #f9e3cc"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="7" />
          <span class="product-info__color-swatch" style="--color: #ff8d73"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="8" />
          <span class="product-info__color-swatch" style="--color: #8e4f24"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="9" />
          <span class="product-info__color-swatch" style="--color: #bb4443"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="10" />
          <span class="product-info__color-swatch" style="--color: #ff8522"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="11" />
          <span class="product-info__color-swatch" style="--color: #eeeff1"></span>
        </label>
        <label class="product-info__color-item">
          <input type="radio" name="color" value="12" />
          <span class="product-info__color-swatch" style="--color: #2680d3"></span>
        </label>
      </div>
    </fieldset>

    <!-- MEMORY -->
    <fieldset class="product-info__section product-info__section--memory">
      <legend class="product-info__title">Объём памяти</legend>
      <div class="product-info__options">
        <label class="product-info__option">
          <input type="radio" name="memory" value="256" required checked />
          <span class="product-info__option-label">256 ГБ</span>
        </label>
        <label class="product-info__option">
          <input type="radio" name="memory" value="512" />
          <span class="product-info__option-label">512 ГБ</span>
        </label>
        <label class="product-info__option">
          <input type="radio" name="memory" value="1024" />
          <span class="product-info__option-label">1024 ГБ</span>
        </label>
        <label class="product-info__option">
          <input type="radio" name="memory" value="2048" />
          <span class="product-info__option-label">2048 ГБ</span>
        </label>
      </div>
    </fieldset>

    <!-- SIM -->
    <fieldset class="product-info__section product-info__section--sim">
      <legend class="product-info__title">Тип SIM</legend>
      <div class="product-info__options">
        <label class="product-info__option">
          <input type="radio" name="sim" value="sim" required checked />
          <span class="product-info__option-label">SIM</span>
        </label>
        <label class="product-info__option">
          <input type="radio" name="sim" value="esim" />
          <span class="product-info__option-label">eSIM</span>
        </label>
      </div>
    </fieldset>

    <!-- CART -->
    <div class="product-info__actions">
      <div class="product-info__quantity">
        <button type="button" class="product-info__quantity-btn" data-action="plus">
          <svg class="icon--count-plus">
            <use href="./icons/symbol/sprite.svg#plus"></use>
          </svg>
        </button>
        <input type="number" name="quantity" value="1" min="1" class="product-info__quantity-input" />
        <button type="button" class="product-info__quantity-btn" data-action="minus">
          <svg class="icon--count-minus">
            <use href="./icons/symbol/sprite.svg#minus"></use>
          </svg>
        </button>
      </div>
      <button type="submit" class="btn btn--info btn--dark">В корзину</button>
    </div>

    <button type="button" class="product-info__request-btn">Запросить наличие товара</button>
  </div>
</form>
