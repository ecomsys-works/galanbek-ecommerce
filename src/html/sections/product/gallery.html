<div class="product-gallery gsap-left">
  <div class="product-gallery__container">

    <!-- Thumbnails -->
    <div class="product-gallery__thumbs swiper">
      <div class="swiper-wrapper">
        <div class="product-gallery__thumb swiper-slide">
          <img src="../../images/webp/product-gallery/pic-1.webp" alt="Product image 1" />
        </div>
        <div class="product-gallery__thumb swiper-slide">
          <img src="../../images/webp/product-gallery/pic-2.webp" alt="Product image 2" />
        </div>
        <div class="product-gallery__thumb swiper-slide">
          <img src="../../images/webp/product-gallery/pic-3.webp" alt="Product image 3" />
        </div>
        <div class="product-gallery__thumb swiper-slide">
          <img src="../../images/webp/product-gallery/pic-4.webp" alt="Product image 4" />
        </div>
        <div class="product-gallery__thumb swiper-slide">
          <img src="../../images/webp/product-gallery/pic-5.webp" alt="Product image 5" />
        </div>
        <div class="product-gallery__thumb swiper-slide">
          <img src="../../images/webp/product-gallery/pic-1.webp" alt="Product image 6" />
        </div>
      </div>
    </div>

    <!-- Main slider -->
    <div class="product-gallery__main swiper">
      <div class="swiper-wrapper">

        <div class="product-gallery__slide swiper-slide">
          <a
            href="../../images/webp/product-gallery/pic-1.webp"
            data-fancybox="product-gallery"
            data-caption="Product image 1"
          >
            <img src="../../images/webp/product-gallery/pic-1.webp" alt="Product image 1" />
          </a>
        </div>

        <div class="product-gallery__slide swiper-slide">
          <a
            href="../../images/webp/product-gallery/pic-2.webp"
            data-fancybox="product-gallery"
            data-caption="Product image 2"
          >
            <img src="../../images/webp/product-gallery/pic-2.webp" alt="Product image 2" />
          </a>
        </div>

        <div class="product-gallery__slide swiper-slide">
          <a
            href="../../images/webp/product-gallery/pic-3.webp"
            data-fancybox="product-gallery"
            data-caption="Product image 3"
          >
            <img src="../../images/webp/product-gallery/pic-3.webp" alt="Product image 3" />
          </a>
        </div>

        <div class="product-gallery__slide swiper-slide">
          <a
            href="../../images/webp/product-gallery/pic-4.webp"
            data-fancybox="product-gallery"
            data-caption="Product image 4"
          >
            <img src="../../images/webp/product-gallery/pic-4.webp" alt="Product image 4" />
          </a>
        </div>

        <div class="product-gallery__slide swiper-slide">
          <a
            href="../../images/webp/product-gallery/pic-5.webp"
            data-fancybox="product-gallery"
            data-caption="Product image 5"
          >
            <img src="../../images/webp/product-gallery/pic-5.webp" alt="Product image 5" />
          </a>
        </div>

        <div class="product-gallery__slide swiper-slide">
          <a
            href="../../images/webp/product-gallery/pic-1.webp"
            data-fancybox="product-gallery"
            data-caption="Product image 6"
          >
            <img src="../../images/webp/product-gallery/pic-1.webp" alt="Product image 6" />
          </a>
        </div>

      </div>

      <!-- Navigation -->
      <div class="product-gallery__nav">
        <button class="product-gallery__arrow product-gallery__arrow--prev">
          <svg class="icon icon--angle-left">
            <use href="./icons/symbol/sprite.svg#angle-left"></use>
          </svg>
        </button>
        <button class="product-gallery__arrow product-gallery__arrow--next">
          <svg class="icon icon--angle-right">
            <use href="./icons/symbol/sprite.svg#angle-right"></use>
          </svg>
        </button>
      </div>

    </div>
  </div>
</div>
